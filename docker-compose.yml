version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: idp_postgres
    restart: always
    environment:
      POSTGRES_USER: idpuser
      POSTGRES_PASSWORD: idppassword
      POSTGRES_DB: idp_workbench
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U idpuser -d idp_workbench']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: idp_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc
    container_name: idp_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/idp-blobs;
      mc mb --ignore-existing local/idp-pages;
      mc anonymous set public local/idp-blobs;
      mc anonymous set public local/idp-pages;
      echo 'Buckets created.';
      "

volumes:
  postgres_data:
  minio_data:
